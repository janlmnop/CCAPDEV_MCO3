<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab World - Current Reservations</title>
    <link rel="stylesheet" href="/css/reservations.css">
    <style>
        /* ── ACTION BUTTONS ── */
        .action-btns {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            width: 97%;
            margin: 6px auto 0 auto;
        }
        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: block;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .action-btn img {
            height: 38px;
            width: auto;
            display: block;
        }
        .action-btn:hover img {
            opacity: 0.85;
            transform: scale(1.03);
        }
        .action-btn:disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        /* ── DELETE/EDIT POPUP ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: rgba(20, 15, 40, 0.97);
            border: 2px solid #9b7fe8;
            border-radius: 10px;
            padding: 36px 44px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            font-family: 'Nine0', monospace;
        }
        .modal-box-title {
            color: #c0b8e8;
            font-size: 26px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .modal-box-details {
            color: #c0b8e8;
            font-size: 18px;
            margin-bottom: 28px;
            line-height: 2;
            text-align: left;
        }
        .modal-box-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .modal-confirm-btn {
            background: rgba(155, 127, 232, 0.2);
            color: #c0b8e8;
            border: 2px solid #9b7fe8;
            border-radius: 6px;
            padding: 10px 30px;
            font-family: 'Nine0', monospace;
            font-size: 20px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .modal-confirm-btn:hover { background: rgba(155, 127, 232, 0.4); color: #ffffff; }
        .modal-cancel-btn {
            background: transparent;
            color: #c0b8e8;
            border: 2px solid #9b7fe8;
            border-radius: 6px;
            padding: 10px 30px;
            font-family: 'Nine0', monospace;
            font-size: 20px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .modal-cancel-btn:hover { background: rgba(155, 127, 232, 0.2); color: #ffffff; }

        /* selected row highlight */
        .row-selected td {
            background-color: rgba(155, 127, 232, 0.2) !important;
        }
    </style>
</head>
<body>

    <!-- ── SIDE NAVIGATION ── -->
    <div class="sidenav" id="sidenav">
        <img src="/images/logo copy.png" alt="Logo" class="nav-logo">
        <div class="nav-links">
            <div id="nav-items"></div>
            <button class="nav-back-btn" onclick="history.back()">&lt; back</button>
        </div>
    </div>

    <!-- ── LEFT PANEL ── -->
    <div class="left-panel">
        <img src="/images/default.jpeg" alt="User" class="user-picture" id="profile-pic">
        <div class="user-name" id="user-name">Loading...</div>
        <div class="user-id" id="user-id"></div>
        <div class="user-course" id="user-course"></div>
    </div>

    <!-- ── MAIN CONTENT ── -->
    <div class="main-content">
        <div class="page-title">Reservations</div>

        <div class="tab-container">
            <img src="/images/tab-ur.png" alt="" class="tab-bg">

            <div class="tab-labels">
                <div class="tab-label active">Current</div>
                <div class="tab-label"><a id="past-tab-link" href="/views/shared/reservations_past.html">Past</a></div>
            </div>

            <div class="tab-inner">
                <!-- Filter row -->
                <div class="filter-row">
                    <div class="filter-dropdown" id="filterDropdown">
                        <button class="filter-btn" id="filterBtn">
                            <img src="/images/ascendorderby_logo.png" alt="Filter By">
                        </button>
                        <div class="filter-content">
                            <div class="filter-option">Date</div>
                            <div class="filter-option">Time</div>
                            <div class="filter-option">Lab</div>
                            <div class="filter-option">Computer</div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-wrapper">
                    <table class="reservations-table" id="reservations-table">
                        <thead>
                            <tr id="table-header">
                                <th class="select-col">select</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Lab</th>
                                <th>Computer</th>
                                <th>Request Date and Time</th>
                            </tr>
                        </thead>
                        <tbody id="reservations-tbody"></tbody>
                    </table>
                </div>

                <!-- Edit + Delete buttons below table, left-aligned -->
                <div class="action-btns">
                    <button class="action-btn" id="editBtn" disabled>
                        <img src="/images/edit_logo.png" alt="Edit">
                    </button>
                    <button class="action-btn" id="deleteBtn" disabled>
                        <img src="/images/delete_logo.png" alt="Delete">
                    </button>
                </div>

                <!-- Pagination -->
                <div class="pagination-btns">
                    <button class="page-btn" id="prevBtn">
                        <img src="/images/previous_logo.png" alt="Previous">
                    </button>
                    <span class="page-indicator" id="pageIndicator">1 / 1</span>
                    <button class="page-btn" id="nextBtn">
                        <img src="/images/next_logo.png" alt="Next">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── DELETE POPUP ── -->
    <div class="modal-overlay" id="deleteOverlay">
        <div class="modal-box">
            <div class="modal-box-title">Delete Reservation?</div>
            <div class="modal-box-details" id="deleteDetails"></div>
            <div class="modal-box-btns">
                <button class="modal-confirm-btn" id="deleteConfirmBtn">Delete</button>
                <button class="modal-cancel-btn" id="deleteCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE  = "/api";
        const userType  = localStorage.getItem('userType') || sessionStorage.getItem('userType') || 'student';
        const loggedInUser = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

        const urlParams      = new URLSearchParams(window.location.search);
        const viewStudent    = urlParams.get('view_student');
        const userId         = viewStudent ? parseInt(viewStudent, 10) : loggedInUser._id;
        const profileType    = viewStudent ? 'student' : userType;
        const isViewingOther = !!viewStudent && userType === 'labtech';

        // carry view_student to Past tab
        if (viewStudent) {
            const pastLink = document.getElementById('past-tab-link');
            if (pastLink) pastLink.href = `/views/shared/reservations_past.html?view_student=${viewStudent}`;
        }

        // ── LOAD USER INFO ──
        async function loadUserInfo() {
            try {
                const endpoint = profileType === 'labtech'
                    ? `${API_BASE}/labtech/${userId}`
                    : `${API_BASE}/students/${userId}`;
                const res  = await fetch(endpoint);
                const data = await res.json();
                document.getElementById('user-name').textContent   = data.name;
                document.getElementById('user-id').textContent     = data._id;
                document.getElementById('user-course').textContent = profileType === 'labtech'
                    ? data.job_title
                    : `${data.college_code} ${data.course_code}`;
                document.getElementById('profile-pic').src = `/images/${data.profile_img || 'default.jpeg'}`;
            } catch (err) {
                console.error("Failed to load user info:", err);
            }
        }

        // ── FORMAT TIME ──
        function fmtSlot(s) {
            let h = parseInt(s.slice(0, 2));
            const m = s.slice(2);
            const period = h >= 12 ? 'PM' : 'AM';
            if (h > 12) h -= 12;
            if (h === 0) h = 12;
            return `${h}:${m}${period}`;
        }

        function fmtRequestDateTime(s) {
            const dt = new Date(s);
        
            const y = dt.getFullYear();
            const mon = String(dt.getMonth() + 1).padStart(2, '0');
            const d = String(dt.getDate()).padStart(2, '0');
        
            let h = dt.getHours();
            const min = String(dt.getMinutes()).padStart(2, '0');
            const period = h >= 12 ? 'PM' : 'AM';
        
            if (h > 12) h -= 12;
            if (h === 0) h = 12;
        
            return {
                date: `${y}-${mon}-${d}`,
                time: `${h}:${min}${period}`
            };
        }

        // ── LAB TECH DELETE HELPERS ──
        function getCurrentDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function getCurrentTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return parseInt(`${hours}${minutes}`, 10);
        }
        
        function canDelete(reservation) {
            const today = getCurrentDate();
            const curTime = getCurrentTime();
        
            if (reservation.date !== today) {
                return true;
            }
        
            const startTime = parseInt(reservation.start_time, 10);
            const deleteTime = startTime + 10;
        
            if (curTime >= startTime && curTime < deleteTime) {
                return false;
            }
        
            return true;
        }

        // ── SELECTED RESERVATIONS ──
        let selectedReservations = [];
        const editBtn   = document.getElementById('editBtn');
        const deleteBtn = document.getElementById('deleteBtn');

        const viewingOther = userType === 'student' && viewStudent && String(viewStudent) !== String(loggedInUser._id);
        if (viewingOther) {
            editBtn.style.display = "none";
            deleteBtn.style.display = "none";
        }

        function updateActionBtns() {
            const hasSelection = selectedReservations.length > 0;
            let canManage = hasSelection;
            let hideButtons = false;

            // if student, check if viewing other profile
            const ViewingOther = userType === 'student' && viewStudent;
            
            if (ViewingOther) {
            	canManage = false;
            	hideButtons = true;
            }
        
            editBtn.disabled = !canManage;
            deleteBtn.disabled = !canManage;

            if (hideButtons) {
                editBtn.style.display = "none";
                deleteBtn.style.display = "none";
            } else {
                editBtn.style.display = "";
                deleteBtn.style.display = "";
            }
        }

        // ── DELETE POPUP ──
        function openDeletePopup() {
            const details = selectedReservations.map(r =>
                `Date: ${r.date} | Time: ${r.time} | Lab: ${r.lab} | Comp: ${r.comp}`
            ).join('<br>');
            document.getElementById('deleteDetails').innerHTML = details;
            document.getElementById('deleteOverlay').classList.add('active');
        }

        function closeDeletePopup() {
            document.getElementById('deleteOverlay').classList.remove('active');
        }

        document.getElementById('deleteCancelBtn').addEventListener('click', closeDeletePopup);

        document.getElementById('deleteConfirmBtn').addEventListener('click', async function () {
            try {
                await Promise.all(selectedReservations.map(r =>
                    fetch(`${API_BASE}/reservation/${r.id}`, { method: 'DELETE' })
                ));
                closeDeletePopup();
                selectedReservations = [];
                updateActionBtns();
                await loadReservations();
            } catch (err) {
                alert('Could not connect to server.');
                console.error(err);
            }
        });

        // ── EDIT BUTTON ──
        // navigates to the edit page for the selected reservation
        editBtn.addEventListener('click', function () {
            if (selectedReservations.length !== 1) {
                alert('Please select exactly one reservation to edit.');
                return;
            }
            const r = selectedReservations[0];
            // navigate to the lab-tech edit page with the reservation id
            if (userType === "labtech") {
                window.location.href = `/views/labtech/lt-vr-cs-ce.html?lab=${r.lab_id}&comp=${r.comp_no}&reservation_id=${r.id}`;
            } else if (userType === "student") {
                if (String(loggedInUser._id) !== String(r.owner_id)) {
                    return;
                }

                window.location.href = `/views/student/s-rc-cs-ce.html?lab=${r.lab_id}&comp=${r.comp_no}&reservation_id=${r.id}`;
            }
        });

        deleteBtn.addEventListener('click', function () {
            if (selectedReservations.length === 0) return;
        
            if (userType === "labtech") {
                const cannotDelete = selectedReservations.some(function (r) {
                    return !canDelete(r);
                });
        
                if (cannotDelete) {
                    alert("Ongoing reservations can only be deleted within 10 minutes of the current time slot.");
                    return;
                }
            }
        
            openDeletePopup();
        });

        // ── LOAD RESERVATIONS ──
        async function loadReservations() {
            selectedReservations = [];
            updateActionBtns();

            try {
                const res   = await fetch(`${API_BASE}/reservations/${userId}`);
                const all   = await res.json();
                const today = new Date().toISOString().split('T')[0];

                const current = all.filter(r => r.date >= today && r.status === 'active');

                const tbody = document.getElementById('reservations-tbody');
                tbody.innerHTML = '';

                if (current.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#9b7fe8;padding:20px;">No current reservations</td></tr>`;
                } else {
                    current.forEach(r => {
                        const timeStr = `${fmtSlot(r.start_time)}-${fmtSlot(r.end_time)}`;
                        const compNo  = String(r.computer_no).padStart(2, '0');
                        const requestDateTime = fmtRequestDateTime(r.updated_at);

                        const tr = document.createElement('tr');
                        tr.dataset.id        = r._id;
                        tr.dataset.date      = r.date;
                        tr.dataset.time      = timeStr;
                        tr.dataset.lab       = r.lab_name;
                        tr.dataset.comp      = compNo;
                        tr.dataset.labId     = r.lab_id;
                        tr.dataset.compNo    = r.computer_no;
                        tr.dataset.owner_id   = r.user_id;
                        tr.dataset.startTime = r.start_time;
                        tr.dataset.endTime   = r.end_time;

                        tr.innerHTML = `
                            <td class="checkbox-cell">
                                <input type="checkbox" class="res-checkbox">
                            </td>
                            <td>${r.date}</td>
                            <td>${timeStr}</td>
                            <td>${r.lab_name}</td>
                            <td>${compNo}</td>
                            <td>${requestDateTime.date}<br>${requestDateTime.time}</td>
                        `;

                        // checkbox select/deselect
                        tr.querySelector('.res-checkbox').addEventListener('change', function () {
                            if (this.checked) {
                                tr.classList.add('row-selected');
                                selectedReservations.push({
                                    id:         tr.dataset.id,
                                    date:       tr.dataset.date,
                                    time:       tr.dataset.time,
                                    lab:        tr.dataset.lab,
                                    comp:       tr.dataset.comp,
                                    lab_id:     tr.dataset.labId,
                                    comp_no:    tr.dataset.compNo,
                                    owner_id:   tr.dataset.owner_id,
                                    start_time: tr.dataset.startTime,
                                    end_time:   tr.dataset.endTime
                                });
                            } else {
                                tr.classList.remove('row-selected');
                                selectedReservations = selectedReservations.filter(s => s.id !== tr.dataset.id);
                            }
                            updateActionBtns();
                        });

                        tbody.appendChild(tr);
                    });
                }

                currentPage = 1;
                renderPage();
            } catch (err) {
                console.error("Failed to load reservations:", err);
                document.getElementById('reservations-tbody').innerHTML =
                    `<tr><td colspan="6" style="text-align:center;color:#c87f7f;padding:20px;">Could not load reservations. Is the server running?</td></tr>`;
            }
        }

        // ── PAGINATION ──
        const ROWS_PER_PAGE = 3;
        let currentPage = 1;

        function getRows() {
            return Array.from(document.querySelectorAll('.reservations-table tbody tr'));
        }

        function renderPage() {
            const allRows    = getRows();
            const totalPages = Math.max(1, Math.ceil(allRows.length / ROWS_PER_PAGE));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * ROWS_PER_PAGE;
            const end   = start + ROWS_PER_PAGE;
            allRows.forEach((row, i) => { row.style.display = (i >= start && i < end) ? '' : 'none'; });
            document.getElementById('pageIndicator').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; renderPage(); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            const total = Math.ceil(getRows().length / ROWS_PER_PAGE);
            if (currentPage < total) { currentPage++; renderPage(); }
        });

        // ── FILTER DROPDOWN ──
        const filterDropdown = document.getElementById('filterDropdown');
        const filterBtn      = document.getElementById('filterBtn');
        filterBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            filterDropdown.classList.toggle('active');
        });
        document.addEventListener('click', (e) => {
            if (!filterDropdown.contains(e.target)) filterDropdown.classList.remove('active');
        });

        // ── SORTING ──
        function getColIndex(opt) {
            return { 'Date': 1, 'Time': 2, 'Lab': 3, 'Computer': 4, 'Request Date and Time': 5 }[opt];
        }
        function parseDate(s) { return new Date(s.trim()); }
        function parseTime(s) {
            const st = s.split('-')[0].trim();
            const m  = st.match(/(\d+):(\d+)(AM|PM)/i);
            if (!m) return 0;
            let h = parseInt(m[1]);
            const mins = parseInt(m[2]);
            const per  = m[3].toUpperCase();
            if (per === 'PM' && h !== 12) h += 12;
            if (per === 'AM' && h === 12) h = 0;
            return h * 60 + mins;
        }
        function parseLab(s) {
            s = s.trim();
            const m = s.match(/^([A-Za-z]+)(\d+)([A-Za-z]*)$/);
            return m ? m[1] + m[2].padStart(6, '0') + m[3] : s;
        }
        function parseCpu(s) { return parseInt(s.trim(), 10) || 0; }

        function sortTable(col) {
            const tbody = document.querySelector('.reservations-table tbody');
            const rows  = Array.from(tbody.querySelectorAll('tr'));
            const idx   = getColIndex(col);
            rows.sort((a, b) => {
                const at = a.cells[idx] ? a.cells[idx].textContent.trim() : '';
                const bt = b.cells[idx] ? b.cells[idx].textContent.trim() : '';
                if (col === 'Date')     return parseDate(at) - parseDate(bt);
                if (col === 'Time')     return parseTime(at) - parseTime(bt);
                if (col === 'Lab')      return parseLab(at).localeCompare(parseLab(bt));
                if (col === 'Computer') return parseCpu(at) - parseCpu(bt);
                return 0;
            });
            rows.forEach(r => tbody.appendChild(r));
            currentPage = 1;
            renderPage();
        }

        document.querySelectorAll('.filter-option').forEach(opt => {
            opt.addEventListener('click', function () {
                sortTable(this.textContent.trim());
                filterDropdown.classList.remove('active');
            });
        });

        // ── SIDENAV ──
        (function buildNav() {
            const uType    = localStorage.getItem('userType') || sessionStorage.getItem('userType') || 'student';
            const navItems = document.getElementById('nav-items');
            const studentLinks = [
                { label: 'Home',              href: '/views/student/mainmenu_student.html' },
                { label: 'Reserve Computer',  href: '/views/student/s-rc-ls.html' },
                { label: 'Student Search',    href: '/views/student/s-ss.html' },
                { label: 'View User Profile', href: '/views/student/userprofile_student.html' }
            ];
            const labtechLinks = [
                { label: 'Home',                href: '/views/labtech/mainmenu_labtech.html' },
                { label: 'View Reservations',   href: '/views/labtech/lt-vr-ls.html' },
                { label: 'Student Search',      href: '/views/labtech/lt-ss.html' },
                { label: 'View User Profile',   href: '/views/labtech/userprofile_labtech.html' }
            ];
            const links = uType === 'labtech' ? labtechLinks : studentLinks;
            links.forEach(function (link) {
                const a = document.createElement('a');
                a.href = link.href;
                a.textContent = link.label;
                if (link.active) a.classList.add('active-link');
                navItems.appendChild(a);
            });
        })();

        // ── INIT ──
        window.addEventListener('load', async () => {
            await loadUserInfo();
            await loadReservations();
        });
    </script>
</body>
</html>
